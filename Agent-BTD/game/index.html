  bfb:     { color:'#cc2222', hp:700, speed:0.3, cash:100,children:['moab','moab','moab','moab'], rbe:3164, isBlimp:true, blimpName:'BFB' },
};

// ── Map Waypoints ──────────────────────────────────────────────
const RAW_WAYPOINTS = [
  {x:-40,  y:200},
  {x:100,  y:200},
  {x:280,  y:140},
  {x:450,  y:100},
  {x:620,  y:160},
  {x:720,  y:300},

  {x:1050, y:600},
  {x:1180, y:480},
  {x:1280, y:350},
  {x:1400, y:300},
  {x:1640, y:320},
];

// Zone labels along the path
const ZONE_LABELS = [
  { pathPct: 0.10, text: 'HARDWARE AD+' },
  { pathPct: 0.30, text: 'BOZ AGENTIC' },
  { pathPct: 0.50, text: 'ULTRAWASH' },

];

// ── Game State ─────────────────────────────────────────────────
let canvas, ctx, bgCanvas, bgCtx;
let gameW = 1600, gameH = 900;
let scaleFactor = 1, offsetX = 0, offsetY = 0;
let pathPoints = [];
let pathDistances = [];
let totalPathLength = 0;

let state = {
  cash: 650, lives: 100, round: 0, totalPops: 0,
  gameSpeed: 1, autoSend: false, waveActive: false,
  warStartTime: Date.now(), placingTower: null, selectedTower: null,
  towers: [], balloons: [], projectiles: [], particles: [], floatingTexts: [],
  roundBalloons: [], spawnTimer: 0, spawnIndex: 0,
  shakeX: 0, shakeY: 0, shakeDuration: 0,
  waveBannerTimer: 0, autoSendTimer: 0,

  // Combo/streak system

  // AI state
  aiEnabled: false, aiTickTimer: 0, aiLastDecision: '',
  // Juice
  slowMoTimer: 0, slowMoFactor: 1,
  flashFrame: 0, gameTime: 0,
};

let audioCtx = null;
let mouseX = 0, mouseY = 0;

// ── Catmull-Rom Spline ─────────────────────────────────────────
function catmullRom(points, segments) {
  const result = [];
  for (let i = 0; i < points.length - 1; i++) {
    const p0 = points[Math.max(i - 1, 0)];
    const p1 = points[i];
    const p2 = points[i + 1];
    const p3 = points[Math.min(i + 2, points.length - 1)];
    for (let t = 0; t < segments; t++) {
      const s = t / segments;
      const s2 = s * s, s3 = s2 * s;
      const x = 0.5 * ((2*p1.x) + (-p0.x+p2.x)*s + (2*p0.x-5*p1.x+4*p2.x-p3.x)*s2 + (-p0.x+3*p1.x-3*p2.x+p3.x)*s3);
      const y = 0.5 * ((2*p1.y) + (-p0.y+p2.y)*s + (2*p0.y-5*p1.y+4*p2.y-p3.y)*s2 + (-p0.y+3*p1.y-3*p2.y+p3.y)*s3);
      result.push({x, y});
    }
  }
  result.push(points[points.length - 1]);
  return result;
}

function computePathDistances() {
  pathDistances = [0];
  totalPathLength = 0;
  for (let i = 1; i < pathPoints.length; i++) {
    const dx = pathPoints[i].x - pathPoints[i-1].x;
    const dy = pathPoints[i].y - pathPoints[i-1].y;
    totalPathLength += Math.sqrt(dx*dx + dy*dy);
    pathDistances.push(totalPathLength);
  }
}

function getPointAtDistance(dist) {
  if (dist <= 0) return { x: pathPoints[0].x, y: pathPoints[0].y };
  if (dist >= totalPathLength) return { x: pathPoints[pathPoints.length-1].x, y: pathPoints[pathPoints.length-1].y };
  for (let i = 1; i < pathDistances.length; i++) {
    if (pathDistances[i] >= dist) {
      const segLen = pathDistances[i] - pathDistances[i-1];
      const t = segLen > 0 ? (dist - pathDistances[i-1]) / segLen : 0;
      return {
        x: pathPoints[i-1].x + (pathPoints[i].x - pathPoints[i-1].x) * t,
        y: pathPoints[i-1].y + (pathPoints[i].y - pathPoints[i-1].y) * t,
      };
    }
  }
  return { x: pathPoints[pathPoints.length-1].x, y: pathPoints[pathPoints.length-1].y };
}

function isOnPath(x, y, margin) {
  margin = margin || PATH_W + 10;
  for (let i = 0; i < pathPoints.length - 1; i++) {
    const p = pathPoints[i];
    const dx = x - p.x, dy = y - p.y;
    if (dx*dx + dy*dy < margin*margin) return true;
  }
  return false;
}

// ── Sound System ───────────────────────────────────────────────
let noiseBuffer = null;

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Pre-generate noise buffer
    const sr = audioCtx.sampleRate;
    const len = sr * 0.1;
    noiseBuffer = audioCtx.createBuffer(1, len, sr);
    const data = noiseBuffer.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  } catch(e) {}
}

function playPopSound(bloonType) {
  if (!audioCtx || !noiseBuffer) { playSound('pop'); return; }
  try {
    const now = audioCtx.currentTime;
    const pitchMap = { red:1200, blue:1100, green:1000, yellow:900, pink:800, purple:700, black:600, white:1300, rainbow:500, ceramic:400, moab:200, bfb:120 };
    const basePitch = pitchMap[bloonType] || 800;
    const pitch = basePitch * (0.9 + Math.random() * 0.2);

    // White noise burst
    const noise = audioCtx.createBufferSource();
    noise.buffer = noiseBuffer;
    const nFilter = audioCtx.createBiquadFilter();
    nFilter.type = 'bandpass'; nFilter.frequency.value = pitch; nFilter.Q.value = 2;
    const nGain = audioCtx.createGain();
    nGain.gain.setValueAtTime(0.18, now);
    nGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    noise.connect(nFilter); nFilter.connect(nGain); nGain.connect(audioCtx.destination);
    noise.start(now); noise.stop(now + 0.06);

    // Pitched sine sweep
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(pitch, now);
    osc.frequency.exponentialRampToValueAtTime(Math.max(pitch * 0.25, 60), now + 0.12);
    const oGain = audioCtx.createGain();
    oGain.gain.setValueAtTime(0.12, now);
    oGain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    osc.connect(oGain); oGain.connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.12);

    // Resonance tail
    const res = audioCtx.createOscillator();
    res.type = 'sine'; res.frequency.value = pitch * 0.5;
    const rGain = audioCtx.createGain();
    rGain.gain.setValueAtTime(0.04, now + 0.04);
    rGain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
    res.connect(rGain); rGain.connect(audioCtx.destination);
    res.start(now + 0.04); res.stop(now + 0.22);
  } catch(e) {}
}

function playWaveComplete() {
  if (!audioCtx) return;
  try {
    const now = audioCtx.currentTime;
    const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6
    notes.forEach(function(freq, i) {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine'; osc.frequency.value = freq;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0, now + i * 0.12);
      g.gain.linearRampToValueAtTime(0.1, now + i * 0.12 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.25);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(now + i * 0.12); osc.stop(now + i * 0.12 + 0.25);
    });
  } catch(e) {}
}

function playMoabHorn() {
  if (!audioCtx) return;
  try {
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(55, now);
    osc.frequency.linearRampToValueAtTime(65, now + 0.5);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.15, now + 0.1);
    g.gain.setValueAtTime(0.15, now + 0.35);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 200;
    osc.connect(filter); filter.connect(g); g.connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.6);
  } catch(e) {}
}

function playSound(type) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    switch(type) {
      case 'pop':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.linearRampToValueAtTime(200, now + 0.08);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.08);
        osc.start(now); osc.stop(now + 0.08);
        break;
      case 'shoot':
        osc.type = 'square';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.linearRampToValueAtTime(100, now + 0.04);
        gain.gain.setValueAtTime(0.06, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.04);
        osc.start(now); osc.stop(now + 0.04);
        break;
      case 'cash':
        // Noise click + chime
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1318, now);
        osc.frequency.setValueAtTime(1568, now + 0.06);
        osc.frequency.setValueAtTime(2093, now + 0.12);
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
        if (noiseBuffer) {
          const n = audioCtx.createBufferSource();
          n.buffer = noiseBuffer;
          const ng = audioCtx.createGain();
          ng.gain.setValueAtTime(0.06, now);
          ng.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
          n.connect(ng); ng.connect(audioCtx.destination);
          n.start(now); n.stop(now + 0.03);
        }
        break;
      case 'place':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.linearRampToValueAtTime(300, now + 0.08);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
        break;
      case 'roundstart':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.linearRampToValueAtTime(800, now + 0.2);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
        break;
      case 'moab':
        playMoabHorn();
        gain.gain.setValueAtTime(0, now);
        osc.start(now); osc.stop(now + 0.01);
        break;
    }
  } catch(e) {}
}

// ── Background Rendering ───────────────────────────────────────
function renderBackground() {
  bgCanvas = document.createElement('canvas');
  bgCanvas.width = gameW;
  bgCanvas.height = gameH;
  bgCtx = bgCanvas.getContext('2d');

  // Grass gradient
  const grad = bgCtx.createLinearGradient(0, 0, 0, gameH);
  grad.addColorStop(0, '#5a9c3a');
  grad.addColorStop(0.5, '#4a8c2a');
  grad.addColorStop(1, '#3a7420');
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0, 0, gameW, gameH);

  // Grass texture — random blades
  for (let i = 0; i < 500; i++) {
    const gx = Math.random() * gameW;
    const gy = Math.random() * gameH;
    const gh = 6 + Math.random() * 14;
    const angle = -0.3 + Math.random() * 0.6;
    const green = ['#3d7a22','#4d8a2a','#5a9c35','#6aac40','#3a7020'][Math.floor(Math.random()*5)];
    bgCtx.strokeStyle = green;
    bgCtx.lineWidth = 1 + Math.random();
    bgCtx.beginPath();
    bgCtx.moveTo(gx, gy);
    bgCtx.quadraticCurveTo(gx + angle * gh, gy - gh * 0.6, gx + angle * gh * 1.5, gy - gh);
    bgCtx.stroke();
  }

  // Decorative bushes
  const bushPositions = [
    {x:80, y:380}, {x:850, y:150}, {x:1100, y:750}, {x:1350, y:180},
    {x:500, y:280}, {x:150, y:750}, {x:950, y:480}, {x:1250, y:650},
  ];
  for (const b of bushPositions) {
    if (isOnPath(b.x, b.y, PATH_W + 30)) continue;
    bgCtx.save();
    bgCtx.shadowColor = 'rgba(0,0,0,0.25)';
    bgCtx.shadowBlur = 8;
    bgCtx.shadowOffsetY = 3;
    const bushGrad = bgCtx.createRadialGradient(b.x - 4, b.y - 4, 2, b.x, b.y, 20);
    bushGrad.addColorStop(0, '#4d9030');
    bushGrad.addColorStop(1, '#2d6018');
    bgCtx.fillStyle = bushGrad;
    bgCtx.beginPath();
    bgCtx.arc(b.x, b.y, 18, 0, Math.PI * 2);
    bgCtx.fill();
    bgCtx.beginPath();
    bgCtx.arc(b.x + 12, b.y + 4, 14, 0, Math.PI * 2);
    bgCtx.fill();
    bgCtx.beginPath();
    bgCtx.arc(b.x - 10, b.y + 6, 12, 0, Math.PI * 2);
    bgCtx.fill();
    bgCtx.restore();
  }

  // Water pond
  const pondX = 1050, pondY = 180;
  if (!isOnPath(pondX, pondY, PATH_W + 40)) {
    bgCtx.save();
    bgCtx.shadowColor = 'rgba(0,0,0,0.2)';
    bgCtx.shadowBlur = 10;
    const pondGrad = bgCtx.createRadialGradient(pondX - 6, pondY - 6, 4, pondX, pondY, 35);
    pondGrad.addColorStop(0, '#66bbee');
    pondGrad.addColorStop(0.7, '#3388aa');
    pondGrad.addColorStop(1, '#226688');
    bgCtx.fillStyle = pondGrad;
    bgCtx.beginPath();
    bgCtx.ellipse(pondX, pondY, 40, 30, 0, 0, Math.PI * 2);
    bgCtx.fill();
    // Shine
    bgCtx.fillStyle = 'rgba(255,255,255,0.25)';
    bgCtx.beginPath();
    bgCtx.ellipse(pondX - 10, pondY - 8, 12, 6, -0.3, 0, Math.PI * 2);
    bgCtx.fill();
    bgCtx.restore();
  }

  // Wildflowers
  const flowerColors = ['#ff6688','#ffaa44','#ff44aa','#44aaff','#ffff55','#ff5555','#aa66ff'];
  for (let i = 0; i < 120; i++) {
    const fx = Math.random() * gameW, fy = Math.random() * gameH;
    if (isOnPath(fx, fy, PATH_W + 20)) continue;
    const fc = flowerColors[Math.floor(Math.random() * flowerColors.length)];
    const fr = 1.5 + Math.random() * 2.5;
    bgCtx.fillStyle = fc;
    bgCtx.beginPath();
    // Petal flower shape
    for (let p = 0; p < 5; p++) {
      const pa = (p / 5) * Math.PI * 2;
      bgCtx.moveTo(fx + Math.cos(pa) * fr, fy + Math.sin(pa) * fr);
      bgCtx.arc(fx + Math.cos(pa) * fr, fy + Math.sin(pa) * fr, fr * 0.5, 0, Math.PI * 2);
    }
    bgCtx.fill();
    bgCtx.fillStyle = '#ffee44';
    bgCtx.beginPath();
    bgCtx.arc(fx, fy, fr * 0.3, 0, Math.PI * 2);
    bgCtx.fill();
  }

  // Rocks
  const rockPositions = [
    {x:200, y:320, s:1.2}, {x:750, y:250, s:0.8}, {x:1300, y:400, s:1.0},
    {x:400, y:650, s:0.7}, {x:900, y:550, s:1.1}, {x:1150, y:300, s:0.6},
    {x:550, y:150, s:0.9}, {x:1400, y:700, s:1.0},
  ];
  for (const rk of rockPositions) {
    if (isOnPath(rk.x, rk.y, PATH_W + 20)) continue;
    bgCtx.save();
    bgCtx.translate(rk.x, rk.y);
    const rScale = rk.s;
    const rkGrad = bgCtx.createLinearGradient(-8*rScale, -6*rScale, 8*rScale, 6*rScale);
    rkGrad.addColorStop(0, '#9a9a8a');
    rkGrad.addColorStop(0.5, '#7a7a6a');
    rkGrad.addColorStop(1, '#5a5a4a');
    bgCtx.fillStyle = rkGrad;
    bgCtx.beginPath();
    bgCtx.moveTo(-8*rScale, 2*rScale);
    bgCtx.quadraticCurveTo(-9*rScale, -4*rScale, -2*rScale, -6*rScale);
    bgCtx.quadraticCurveTo(3*rScale, -7*rScale, 8*rScale, -3*rScale);
    bgCtx.quadraticCurveTo(10*rScale, 2*rScale, 6*rScale, 4*rScale);
    bgCtx.quadraticCurveTo(0, 6*rScale, -8*rScale, 2*rScale);
    bgCtx.fill();
    // Rock highlight
    bgCtx.fillStyle = 'rgba(255,255,255,0.12)';
    bgCtx.beginPath();
    bgCtx.ellipse(-2*rScale, -3*rScale, 4*rScale, 2*rScale, -0.3, 0, Math.PI * 2);
    bgCtx.fill();
    bgCtx.restore();
  }

  // Tree clusters
  const treePositions = [
    {x:60, y:100}, {x:1400, y:100}, {x:1500, y:500},
    {x:80, y:600}, {x:700, y:80}, {x:1100, y:850},
  ];
  for (const tr of treePositions) {
    if (isOnPath(tr.x, tr.y, PATH_W + 40)) continue;
    bgCtx.save();
    // Trunk
    bgCtx.fillStyle = '#5a4020';
    bgCtx.fillRect(tr.x - 3, tr.y - 5, 6, 20);
    // Layered canopy
    const canopyColors = ['#2d6018', '#3a7822', '#4d9030'];
    for (let ci = 0; ci < 3; ci++) {
      bgCtx.fillStyle = canopyColors[ci];
      bgCtx.beginPath();
      bgCtx.arc(tr.x + (ci - 1) * 6, tr.y - 12 - ci * 4, 14 - ci * 2, 0, Math.PI * 2);
      bgCtx.fill();
    }
    // Canopy highlight
    bgCtx.fillStyle = 'rgba(100,180,50,0.3)';
    bgCtx.beginPath();
    bgCtx.arc(tr.x - 3, tr.y - 20, 6, 0, Math.PI * 2);
    bgCtx.fill();
    bgCtx.restore();
  }

  // Path — draw with dirt brown
  bgCtx.save();
  bgCtx.strokeStyle = '#7a6440';
  bgCtx.lineWidth = PATH_W + 8;
  bgCtx.lineCap = 'round';
  bgCtx.lineJoin = 'round';
  bgCtx.beginPath();
  bgCtx.moveTo(pathPoints[0].x, pathPoints[0].y);
  for (let i = 1; i < pathPoints.length; i++) bgCtx.lineTo(pathPoints[i].x, pathPoints[i].y);
  bgCtx.stroke();

  bgCtx.strokeStyle = '#a0845c';
  bgCtx.lineWidth = PATH_W;
  bgCtx.beginPath();
  bgCtx.moveTo(pathPoints[0].x, pathPoints[0].y);
  for (let i = 1; i < pathPoints.length; i++) bgCtx.lineTo(pathPoints[i].x, pathPoints[i].y);
  bgCtx.stroke();

  // Path highlight (lighter center)
  bgCtx.strokeStyle = 'rgba(200,180,140,0.2)';
  bgCtx.lineWidth = PATH_W * 0.4;
  bgCtx.beginPath();
  bgCtx.moveTo(pathPoints[0].x, pathPoints[0].y);
  for (let i = 1; i < pathPoints.length; i++) bgCtx.lineTo(pathPoints[i].x, pathPoints[i].y);
  bgCtx.stroke();
  bgCtx.restore();

  // Cobblestone dots on path
  bgCtx.save();
  for (let ci = 0; ci < pathPoints.length; ci += 8) {
    const pp = pathPoints[ci];
    for (let cj = 0; cj < 4; cj++) {
      const cx = pp.x + (Math.random() - 0.5) * PATH_W * 0.7;
      const cy = pp.y + (Math.random() - 0.5) * PATH_W * 0.7;
      const cr = 1.5 + Math.random() * 2;
      bgCtx.fillStyle = 'rgba(130,110,80,' + (0.15 + Math.random() * 0.1) + ')';
      bgCtx.beginPath();
      bgCtx.arc(cx, cy, cr, 0, Math.PI * 2);
      bgCtx.fill();
    }
  }
  bgCtx.restore();

  // Edge grass along path
  bgCtx.save();
  for (let ei = 0; ei < pathPoints.length; ei += 6) {
    const pp = pathPoints[ei];
    const nextP = pathPoints[Math.min(ei + 1, pathPoints.length - 1)];
    const dx = nextP.x - pp.x, dy = nextP.y - pp.y;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    const nx = -dy / len, ny = dx / len;
    for (let side = -1; side <= 1; side += 2) {
      const gx = pp.x + nx * (PATH_W * 0.52 + 2) * side;
      const gy = pp.y + ny * (PATH_W * 0.52 + 2) * side;
      const gh = 5 + Math.random() * 8;
      const ga = (Math.random() - 0.5) * 0.4 + (side * 0.2);
      bgCtx.strokeStyle = ['#3d7a22','#4d8a2a','#5a9c35'][Math.floor(Math.random()*3)];
      bgCtx.lineWidth = 1;
      bgCtx.beginPath();
      bgCtx.moveTo(gx, gy);
      bgCtx.quadraticCurveTo(gx + ga * gh, gy - gh * 0.6, gx + ga * gh * 1.5, gy - gh);
      bgCtx.stroke();
    }
  }
  bgCtx.restore();

  // Zone labels
  bgCtx.save();
  bgCtx.font = '11px "Segoe UI", sans-serif';
  bgCtx.textAlign = 'center';
  for (const zl of ZONE_LABELS) {
    const dist = zl.pathPct * totalPathLength;
    const pt = getPointAtDistance(dist);
    bgCtx.fillStyle = 'rgba(255,255,255,0.18)';
    bgCtx.fillText(zl.text, pt.x, pt.y - PATH_W * 0.5 - 8);
  }
  bgCtx.restore();

  // Water sparkle on pond
  if (!isOnPath(1050, 180, PATH_W + 40)) {
    for (let sp = 0; sp < 5; sp++) {
      const sx = 1050 + (Math.random() - 0.5) * 50;
      const sy = 180 + (Math.random() - 0.5) * 30;
      bgCtx.fillStyle = 'rgba(255,255,255,' + (0.2 + Math.random() * 0.3) + ')';
      bgCtx.beginPath();
      bgCtx.arc(sx, sy, 0.5 + Math.random(), 0, Math.PI * 2);
      bgCtx.fill();
    }
  }

  // Border vignette
  bgCtx.save();
  const vigW = gameW, vigH = gameH;
  const vigGrad = bgCtx.createRadialGradient(vigW/2, vigH/2, vigW * 0.35, vigW/2, vigH/2, vigW * 0.7);
  vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vigGrad.addColorStop(1, 'rgba(0,0,0,0.25)');
  bgCtx.fillStyle = vigGrad;
  bgCtx.fillRect(0, 0, vigW, vigH);
  bgCtx.restore();
}

// ── Monkey Drawing ─────────────────────────────────────────────
function drawMonkey(c, def, size, targetAngle, upgradeLevel) {
  const r = size * 0.48;  // head radius
  const earR = r * 0.5;
  const faceR = r * 0.65;
  const eyeR = r * 0.18;
  const pupilR = r * 0.09;

  // Body
  c.fillStyle = def.fur;
  const bodyW = r * 0.9, bodyH = r * 0.7;
  roundRect(c, -bodyW/2, r * 0.3, bodyW, bodyH, 4);
  c.fill();

  // Head
  c.fillStyle = def.fur;
  c.beginPath();
  c.arc(0, -r * 0.1, r, 0, Math.PI * 2);
  c.fill();

  // Ears
  c.fillStyle = def.fur;
  c.beginPath();
  c.arc(-r * 0.85, -r * 0.15, earR, 0, Math.PI * 2);
  c.fill();
  c.beginPath();
  c.arc(r * 0.85, -r * 0.15, earR, 0, Math.PI * 2);
  c.fill();
  // Inner ears
  c.fillStyle = def.face;
  c.beginPath();
  c.arc(-r * 0.85, -r * 0.15, earR * 0.6, 0, Math.PI * 2);
  c.fill();
  c.beginPath();
  c.arc(r * 0.85, -r * 0.15, earR * 0.6, 0, Math.PI * 2);
  c.fill();

  // Face patch
  c.fillStyle = def.face;
  c.beginPath();
  c.arc(0, r * 0.05, faceR, 0, Math.PI * 2);
  c.fill();

  // Eyes
  const eyeOffX = r * 0.3;
  const eyeY = -r * 0.2;
  const lookX = Math.cos(targetAngle || 0) * pupilR * 0.5;
  const lookY = Math.sin(targetAngle || 0) * pupilR * 0.5;

  // White of eyes
  c.fillStyle = '#fff';
  c.beginPath();
  c.arc(-eyeOffX, eyeY, eyeR, 0, Math.PI * 2);
  c.fill();
  c.beginPath();
  c.arc(eyeOffX, eyeY, eyeR, 0, Math.PI * 2);
  c.fill();

  // Pupils
  c.fillStyle = '#111';
  c.beginPath();
  c.arc(-eyeOffX + lookX, eyeY + lookY, pupilR, 0, Math.PI * 2);
  c.fill();
  c.beginPath();
  c.arc(eyeOffX + lookX, eyeY + lookY, pupilR, 0, Math.PI * 2);
  c.fill();

  // Eye highlights
  c.fillStyle = '#fff';
  c.beginPath();
  c.arc(-eyeOffX - pupilR * 0.3, eyeY - pupilR * 0.3, pupilR * 0.4, 0, Math.PI * 2);
  c.fill();
  c.beginPath();
  c.arc(eyeOffX - pupilR * 0.3, eyeY - pupilR * 0.3, pupilR * 0.4, 0, Math.PI * 2);
  c.fill();

  // Nose
  c.fillStyle = darkenColor(def.face, 30);
  c.beginPath();
  c.ellipse(0, r * 0.12, r * 0.12, r * 0.08, 0, 0, Math.PI * 2);
  c.fill();

  // Mouth
  c.strokeStyle = darkenColor(def.face, 50);
  c.lineWidth = 1;
  c.beginPath();
  c.arc(0, r * 0.2, r * 0.15, 0.2, Math.PI - 0.2);
  c.stroke();

  // Accessory
  drawAccessory(c, def.acc, r);

  // Upgrade stars
  if (upgradeLevel && upgradeLevel > 0) {
    const starY = r + r * 0.6;
    c.fillStyle = '#FFD700';
    for (let s = 0; s < upgradeLevel; s++) {
      const starX = (s - (upgradeLevel - 1) / 2) * 7;
      drawStar(c, starX, starY, 3, 5);
    }
  }
}

function drawAccessory(c, acc, r) {
  switch(acc) {
    case 'crown':
      c.fillStyle = '#FFD700';
      c.beginPath();
      c.moveTo(-r*0.5, -r*0.85);
      c.lineTo(-r*0.6, -r*1.3);
      c.lineTo(-r*0.25, -r*1.1);
      c.lineTo(0, -r*1.4);
      c.lineTo(r*0.25, -r*1.1);
      c.lineTo(r*0.6, -r*1.3);
      c.lineTo(r*0.5, -r*0.85);
      c.closePath();
      c.fill();
      c.fillStyle = '#cc2222';
      c.beginPath();
      c.arc(0, -r*1.05, r*0.08, 0, Math.PI*2);
      c.fill();
      break;
    case 'headset':
      c.strokeStyle = '#4488ff';
      c.lineWidth = 2.5;
      c.beginPath();
      c.arc(0, -r*0.3, r*0.85, -2.6, -0.5);
      c.stroke();
      c.fillStyle = '#4488ff';
      c.beginPath();
      c.arc(-r*0.7, r*0.3, r*0.15, 0, Math.PI*2);
      c.fill();
      break;
    case 'glasses':
      c.strokeStyle = '#555';
      c.lineWidth = 1.5;
      c.beginPath();
      c.arc(-r*0.3, -r*0.2, r*0.22, 0, Math.PI*2);
      c.stroke();
      c.beginPath();
      c.arc(r*0.3, -r*0.2, r*0.22, 0, Math.PI*2);
      c.stroke();
      c.beginPath();
      c.moveTo(-r*0.08, -r*0.2);
      c.lineTo(r*0.08, -r*0.2);
      c.stroke();
      break;
    case 'headband':
      c.fillStyle = '#cc2222';
      c.fillRect(-r*0.9, -r*0.55, r*1.8, r*0.2);
      // Tail
      c.beginPath();
      c.moveTo(r*0.9, -r*0.55);
      c.quadraticCurveTo(r*1.3, -r*0.3, r*1.1, -r*0.1);
      c.lineWidth = 2;
      c.strokeStyle = '#cc2222';
      c.stroke();
      break;
    case 'wrap':
      c.fillStyle = '#2d8c4e';
      c.beginPath();
      c.arc(0, -r*0.3, r*0.95, -2.8, -0.35, false);
      c.lineTo(r*0.5, -r*0.6);
      c.arc(0, -r*0.3, r*0.7, -0.35, -2.8, true);
      c.closePath();
      c.fill();
      break;
    case 'goggles':
      c.fillStyle = '#ff6600';
      c.beginPath();
      c.ellipse(-r*0.3, -r*0.65, r*0.22, r*0.15, 0, 0, Math.PI*2);
      c.fill();
      c.beginPath();
      c.ellipse(r*0.3, -r*0.65, r*0.22, r*0.15, 0, 0, Math.PI*2);
      c.fill();
      c.fillStyle = 'rgba(255,200,100,0.4)';
      c.beginPath();
      c.ellipse(-r*0.3, -r*0.65, r*0.16, r*0.1, 0, 0, Math.PI*2);
      c.fill();
      c.beginPath();
      c.ellipse(r*0.3, -r*0.65, r*0.16, r*0.1, 0, 0, Math.PI*2);
      c.fill();
      c.strokeStyle = '#ff6600';
      c.lineWidth = 2;
      c.beginPath();
      c.moveTo(-r*0.08, -r*0.65);
      c.lineTo(r*0.08, -r*0.65);
      c.stroke();
      break;
    case 'hardhat':
      c.fillStyle = '#FFD700';
      c.beginPath();
      c.ellipse(0, -r*0.95, r*0.7, r*0.35, 0, Math.PI, 0);
      c.fill();
      c.fillRect(-r*0.8, -r*0.98, r*1.6, r*0.12);
      break;
    case 'beret':
      c.fillStyle = '#6633cc';
      c.beginPath();
      c.arc(-r*0.2, -r*0.9, r*0.55, 0, Math.PI*2);
      c.fill();
      c.fillStyle = '#7744dd';
      c.beginPath();
      c.arc(-r*0.25, -r*1.0, r*0.12, 0, Math.PI*2);
      c.fill();
      break;
    case 'bandana':
      c.fillStyle = '#3399ff';
      c.beginPath();
      c.moveTo(-r*0.6, -r*0.65);
      c.lineTo(0, -r*1.25);
      c.lineTo(r*0.6, -r*0.65);
      c.closePath();
      c.fill();
      break;
    case 'orb':
      c.save();
      c.shadowColor = '#7744ff';
      c.shadowBlur = 12;
      const orbGrad = c.createRadialGradient(-r*0.05, -r*1.45, 1, 0, -r*1.4, r*0.2);
      orbGrad.addColorStop(0, '#bb88ff');
      orbGrad.addColorStop(1, '#5522aa');
      c.fillStyle = orbGrad;
      c.beginPath();
      c.arc(0, -r*1.4, r*0.2, 0, Math.PI*2);
      c.fill();
      c.restore();
      // Stem
      c.strokeStyle = '#7744ff55';
      c.lineWidth = 1;
      c.beginPath();
      c.moveTo(0, -r*1.2);
      c.lineTo(0, -r*0.9);
      c.stroke();
      break;
    case 'cross':
      c.fillStyle = '#fff';
      c.beginPath();
      c.arc(0, -r*0.7, r*0.2, 0, Math.PI*2);
      c.fill();
      c.fillStyle = '#cc2222';
      c.fillRect(-r*0.02, -r*0.85, r*0.04, r*0.3);
      c.fillRect(-r*0.12, -r*0.75, r*0.24, r*0.04);
      break;
    case 'antenna':
      c.strokeStyle = '#00ccff';
      c.lineWidth = 1.5;
      c.beginPath();
      c.moveTo(0, -r*0.9);
      c.lineTo(0, -r*1.6);
      c.stroke();
      c.fillStyle = '#00ccff';
      c.beginPath();
      c.arc(0, -r*1.65, r*0.12, 0, Math.PI*2);
      c.fill();
      c.fillStyle = 'rgba(0,204,255,0.3)';
      c.beginPath();
      c.arc(0, -r*1.65, r*0.22, 0, Math.PI*2);
      c.fill();
      break;
  }
}

function drawStar(c, cx, cy, r, points) {
  c.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const angle = (i * Math.PI / points) - Math.PI / 2;
    const radius = i % 2 === 0 ? r : r * 0.5;
    if (i === 0) c.moveTo(cx + radius * Math.cos(angle), cy + radius * Math.sin(angle));
    else c.lineTo(cx + radius * Math.cos(angle), cy + radius * Math.sin(angle));
  }
  c.closePath();
  c.fill();
}

function roundRect(c, x, y, w, h, rad) {
  c.beginPath();
  c.moveTo(x + rad, y);
  c.lineTo(x + w - rad, y);
  c.quadraticCurveTo(x + w, y, x + w, y + rad);
  c.lineTo(x + w, y + h - rad);
  c.quadraticCurveTo(x + w, y + h, x + w - rad, y + h);
  c.lineTo(x + rad, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - rad);
  c.lineTo(x, y + rad);
  c.quadraticCurveTo(x, y, x + rad, y);
  c.closePath();
}

function darkenColor(hex, amount) {
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, r - amount);
  g = Math.max(0, g - amount);
  b = Math.max(0, b - amount);
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

// ── Balloon Drawing ────────────────────────────────────────────
function drawTeardropPath(c, r) {
  c.beginPath();
  c.moveTo(0, -r * 1.15);
  c.bezierCurveTo(r * 0.85, -r * 1.15, r * 1.0, -r * 0.15, r * 0.8, r * 0.35);
  c.bezierCurveTo(r * 0.55, r * 0.85, r * 0.15, r * 1.1, 0, r * 1.15);
  c.bezierCurveTo(-r * 0.15, r * 1.1, -r * 0.55, r * 0.85, -r * 0.8, r * 0.35);
  c.bezierCurveTo(-r * 1.0, -r * 0.15, -r * 0.85, -r * 1.15, 0, -r * 1.15);
  c.closePath();
}

function drawBalloon(c, bloon) {
  const pos = getPointAtDistance(bloon.dist);
  const def = BLOON_COLORS[bloon.type];
  if (!def) return;

  // Bob animation
  const bobY = Math.sin(state.gameTime * 3 + bloon.id * 6.28) * 3;
  // Squash/stretch based on speed
  const spd = def.speed;
  const squashX = 1 - (spd - 1) * 0.04;
  const squashY = 1 + (spd - 1) * 0.06;

  c.save();
  c.translate(pos.x, pos.y + bobY);

  // Hit flash
  if (bloon.hitFlash > 0) {
    c.globalAlpha = 1;
  }

  if (def.isBlimp) {
    drawBlimp(c, bloon, def);
  } else {
    const radius = 10 + (bloon.type === 'ceramic' ? 3 : 0);
    c.save();
    c.scale(squashX, squashY);

    // Shadow
    c.fillStyle = 'rgba(0,0,0,0.18)';
    c.beginPath();
    c.ellipse(2, radius * 1.3, radius * 0.7, radius * 0.25, 0, 0, Math.PI * 2);
    c.fill();

    // Teardrop body
    let fillColor;
    if (def.color === 'rainbow') {
      const t = (Date.now() % 2000) / 2000;
      const rainGrad = c.createLinearGradient(-radius, -radius * 1.2, radius, radius * 1.2);
      const hueOffset = t * 360;
      for (let i = 0; i <= 6; i++) {
        rainGrad.addColorStop(i / 6, 'hsl(' + ((hueOffset + i * 60) % 360) + ',90%,55%)');
      }
      fillColor = rainGrad;
    } else {
      const bGrad = c.createRadialGradient(-radius * 0.3, -radius * 0.5, radius * 0.1, radius * 0.1, radius * 0.2, radius * 1.3);
      bGrad.addColorStop(0, lightenColor(def.color, 60));
      bGrad.addColorStop(0.5, def.color);
      bGrad.addColorStop(1, darkenColor(def.color, 25));
      fillColor = bGrad;
    }
    c.fillStyle = fillColor;
    drawTeardropPath(c, radius);
    c.fill();

    // Shadow crescent (dark bottom)
    c.save();
    c.clip();
    c.fillStyle = 'rgba(0,0,0,0.12)';
    c.beginPath();
    c.ellipse(0, radius * 0.8, radius * 1.1, radius * 0.6, 0, 0, Math.PI * 2);
    c.fill();
    c.restore();

    // Specular highlight (bright arc at top)
    drawTeardropPath(c, radius);
    c.save();
    c.clip();
    const specGrad = c.createRadialGradient(-radius * 0.2, -radius * 0.7, radius * 0.05, -radius * 0.1, -radius * 0.4, radius * 0.7);
    specGrad.addColorStop(0, 'rgba(255,255,255,0.5)');
    specGrad.addColorStop(1, 'rgba(255,255,255,0)');
    c.fillStyle = specGrad;
    c.fillRect(-radius * 1.2, -radius * 1.3, radius * 2.4, radius * 1.4);
    c.restore();

    // Rubber sheen (curved white reflection line)
    c.strokeStyle = 'rgba(255,255,255,0.4)';
    c.lineWidth = 1.5;
    c.lineCap = 'round';
    c.beginPath();
    c.moveTo(-radius * 0.4, -radius * 0.85);
    c.quadraticCurveTo(-radius * 0.1, -radius * 1.0, radius * 0.15, -radius * 0.75);
    c.stroke();

    // Rim light (subtle edge glow)
    c.save();
    drawTeardropPath(c, radius);
    c.strokeStyle = 'rgba(255,255,255,0.15)';
    c.lineWidth = 1.5;
    c.stroke();
    c.restore();

    // Ceramic cracks
    if (bloon.type === 'ceramic') {
      drawTeardropPath(c, radius);
      c.save();
      c.clip();
      c.strokeStyle = 'rgba(0,0,0,0.35)';
      c.lineWidth = 0.8;
      const crackPct = 1 - (bloon.hp / BLOON_COLORS.ceramic.hp);
      const cracks = Math.floor(crackPct * 6);
      for (let cr = 0; cr < cracks; cr++) {
        const a = cr * 1.1 + 0.3;
        c.beginPath();
        c.moveTo(Math.cos(a) * 2, Math.sin(a) * 2);
        c.lineTo(Math.cos(a + 0.4) * radius * 0.85, Math.sin(a + 0.4) * radius * 0.85);
        c.lineTo(Math.cos(a + 0.7) * radius * 0.6, Math.sin(a + 0.7) * radius * 1.0);
        c.stroke();
      }
      c.restore();
    }

    c.restore(); // un-scale/squash

    // Knot (folded rubber)
    const knotColor = def.color === 'rainbow' ? '#cc6600' : darkenColor(def.color === 'rainbow' ? '#ff6600' : def.color, 25);
    c.fillStyle = knotColor;
    c.beginPath();
    c.moveTo(-3, radius * 1.15 * squashY);
    c.quadraticCurveTo(-1, radius * 1.25 * squashY, 0, radius * 1.2 * squashY + 3);
    c.quadraticCurveTo(1, radius * 1.25 * squashY, 3, radius * 1.15 * squashY);
    c.quadraticCurveTo(1, radius * 1.18 * squashY, 0, radius * 1.2 * squashY);
    c.quadraticCurveTo(-1, radius * 1.18 * squashY, -3, radius * 1.15 * squashY);
    c.fill();
    // Knot highlight
    c.fillStyle = lightenColor(knotColor, 30);
    c.beginPath();
    c.arc(-1, radius * 1.17 * squashY, 1.2, 0, Math.PI * 2);
    c.fill();

    // String with catenary sway
    const sway = Math.sin(state.gameTime * 2.5 + bloon.id * 3.14) * 4;
    const stringStart = radius * 1.2 * squashY + 3;
    c.strokeStyle = 'rgba(0,0,0,0.25)';
    c.lineWidth = 0.7;
    c.beginPath();
    c.moveTo(0, stringStart);
    c.bezierCurveTo(sway * 0.5, stringStart + 5, sway, stringStart + 10, sway * 0.7, stringStart + 18);
    c.stroke();

    // HP bar for ceramic
    if (bloon.type === 'ceramic' && bloon.hp < BLOON_COLORS.ceramic.hp) {
      const bw = 20, bh = 3;
      c.fillStyle = 'rgba(0,0,0,0.6)';
      roundRect(c, -bw/2, -radius * 1.5, bw, bh, 1.5);
      c.fill();
      c.fillStyle = '#44ff44';
      roundRect(c, -bw/2, -radius * 1.5, bw * (bloon.hp / BLOON_COLORS.ceramic.hp), bh, 1.5);
      c.fill();
    }

    // Hit flash overlay
    if (bloon.hitFlash > 0) {
      c.globalAlpha = bloon.hitFlash;
      c.fillStyle = '#fff';
      c.save();
      c.scale(squashX, squashY);
      drawTeardropPath(c, radius);
      c.fill();
      c.restore();
      c.globalAlpha = 1;
    }
  }

  // Slow indicator
  if (bloon.slowTimer > 0) {
    c.strokeStyle = 'rgba(0,200,255,0.5)';
    c.lineWidth = 2;
    c.setLineDash([3, 3]);
    c.beginPath();
    c.arc(0, 0, 14, 0, Math.PI * 2);
    c.stroke();
    c.setLineDash([]);
  }

  c.restore();
}

function drawBlimp(c, bloon, def) {
  const w = def.blimpName === 'BFB' ? 50 : 38;
  const h = def.blimpName === 'BFB' ? 24 : 18;
  const hpPct = bloon.hp / BLOON_COLORS[bloon.type].hp;

  // Shadow
  c.fillStyle = 'rgba(0,0,0,0.25)';
  c.beginPath();
  c.ellipse(4, 8, w * 0.8, h * 0.4, 0, 0, Math.PI * 2);
  c.fill();

  // Main body gradient
  const blimpGrad = c.createLinearGradient(0, -h, 0, h);
  blimpGrad.addColorStop(0, lightenColor(def.color, 40));
  blimpGrad.addColorStop(0.3, lightenColor(def.color, 15));
  blimpGrad.addColorStop(0.5, def.color);
  blimpGrad.addColorStop(0.8, darkenColor(def.color, 20));
  blimpGrad.addColorStop(1, darkenColor(def.color, 40));
  c.fillStyle = blimpGrad;
  c.beginPath();
  c.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
  c.fill();

  // Panel lines
  c.strokeStyle = 'rgba(0,0,0,0.1)';
  c.lineWidth = 0.5;
  for (let pl = -2; pl <= 2; pl++) {
    c.beginPath();
    c.moveTo(pl * w * 0.25, -h);
    c.lineTo(pl * w * 0.25, h);
    c.stroke();
  }
  c.beginPath();
  c.moveTo(-w, 0);
  c.lineTo(w, 0);
  c.stroke();

  // Specular on top
  const specGrad = c.createLinearGradient(0, -h, 0, -h * 0.3);
  specGrad.addColorStop(0, 'rgba(255,255,255,0.3)');
  specGrad.addColorStop(1, 'rgba(255,255,255,0)');
  c.fillStyle = specGrad;
  c.beginPath();
  c.ellipse(0, -h * 0.3, w * 0.85, h * 0.6, 0, Math.PI, 0);
  c.fill();

  // Fins with detail
  c.fillStyle = darkenColor(def.color, 40);
  c.beginPath();
  c.moveTo(w * 0.7, -h * 0.3);
  c.lineTo(w + 10, -h * 0.9);
  c.lineTo(w + 10, -h * 0.05);
  c.closePath();
  c.fill();
  c.beginPath();
  c.moveTo(w * 0.7, h * 0.3);
  c.lineTo(w + 10, h * 0.9);
  c.lineTo(w + 10, h * 0.05);
  c.closePath();
  c.fill();
  // Fin edge highlight
  c.strokeStyle = lightenColor(def.color, 20);
  c.lineWidth = 0.5;
  c.beginPath();
  c.moveTo(w * 0.7, -h * 0.3);
  c.lineTo(w + 10, -h * 0.9);
  c.stroke();

  // Engine glow
  const engineGlow = c.createRadialGradient(w + 6, 0, 1, w + 6, 0, 8);
  engineGlow.addColorStop(0, 'rgba(255,200,50,0.6)');
  engineGlow.addColorStop(0.5, 'rgba(255,100,20,0.3)');
  engineGlow.addColorStop(1, 'rgba(255,50,0,0)');
  c.fillStyle = engineGlow;
  c.beginPath();
  c.arc(w + 6, 0, 8, 0, Math.PI * 2);
  c.fill();

  // Smoke trail on damage
  if (hpPct < 0.5) {
    const smokeIntensity = 1 - hpPct * 2;
    for (let s = 0; s < 3; s++) {
      const sx = w * 0.3 + s * 12 + Math.sin(state.gameTime * 5 + s) * 3;
      const sy = -h * 0.5 - s * 5 + Math.cos(state.gameTime * 4 + s * 2) * 2;
      const sr = 3 + s * 2;
      c.fillStyle = 'rgba(50,50,50,' + (smokeIntensity * 0.3 * (1 - s/3)) + ')';
      c.beginPath();
      c.arc(sx, sy, sr, 0, Math.PI * 2);
      c.fill();
    }
  }

  // Cockpit window
  const windowGrad = c.createRadialGradient(-w * 0.52, -1, 1, -w * 0.5, 0, 6);
  windowGrad.addColorStop(0, 'rgba(220,240,255,0.8)');
  windowGrad.addColorStop(1, 'rgba(100,180,255,0.4)');
  c.fillStyle = windowGrad;
  c.beginPath();
  c.ellipse(-w * 0.5, 0, 6, 5, 0, 0, Math.PI * 2);
  c.fill();
  // Window frame
  c.strokeStyle = darkenColor(def.color, 30);
  c.lineWidth = 0.8;
  c.stroke();

  // Name
  c.fillStyle = '#fff';
  c.font = 'bold 9px sans-serif';
  c.textAlign = 'center';
  c.shadowColor = 'rgba(0,0,0,0.5)';
  c.shadowBlur = 3;
  c.fillText(def.blimpName, 0, 4);
  c.shadowBlur = 0;

  // HP bar with rounded corners
  const maxHp = BLOON_COLORS[bloon.type].hp;
  const bw = w * 1.5, bh = 5;
  c.fillStyle = 'rgba(0,0,0,0.7)';
  roundRect(c, -bw/2, -h - 10, bw, bh, 2);
  c.fill();
  c.fillStyle = hpPct > 0.5 ? '#44ff44' : hpPct > 0.25 ? '#ffaa00' : '#ff3333';
  if (bw * hpPct > 4) {
    roundRect(c, -bw/2, -h - 10, bw * hpPct, bh, 2);
    c.fill();
  }
  // HP bar border
  c.strokeStyle = 'rgba(255,255,255,0.2)';
  c.lineWidth = 0.5;
  roundRect(c, -bw/2, -h - 10, bw, bh, 2);
  c.stroke();

  // Hit flash
  if (bloon.hitFlash > 0) {
    c.globalAlpha = bloon.hitFlash * 0.5;
    c.fillStyle = '#fff';
    c.beginPath();
    c.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    c.fill();
    c.globalAlpha = 1;
  }
}

function lightenColor(hex, amount) {
  if (hex === 'rainbow') return '#ffcc66';
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, r + amount);
  g = Math.min(255, g + amount);
  b = Math.min(255, b + amount);
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

// ── Tower Shop Previews ────────────────────────────────────────
function renderTowerPreview(key) {
  const def = TOWER_DEFS[key];
  const cvs = document.createElement('canvas');
  cvs.width = 44;
  cvs.height = 44;
  const c = cvs.getContext('2d');
  c.save();
  c.translate(22, 24);
  drawMonkey(c, def, 32, 0, 0);
  c.restore();
  return cvs;
}

// ── Build Shop Panel ───────────────────────────────────────────
function buildShopPanel() {
  const list = document.getElementById('tower-list');
  while (list.firstChild) list.removeChild(list.firstChild);

  for (const key of TOWER_ORDER) {
    const def = TOWER_DEFS[key];
    const card = document.createElement('div');
    card.className = 'tower-card';
    card.dataset.tower = key;

    const preview = renderTowerPreview(key);
    card.appendChild(preview);

    const info = document.createElement('div');
    info.className = 'tower-info';

    const nameEl = document.createElement('div');
    nameEl.className = 'tower-name';
    nameEl.textContent = def.name;
    info.appendChild(nameEl);

    const costEl = document.createElement('div');
    costEl.className = 'tower-cost';
    costEl.textContent = '$' + def.cost;
    info.appendChild(costEl);

    const descEl = document.createElement('div');
    descEl.className = 'tower-desc';
    descEl.textContent = def.isFarm ? 'Income: $' + def.income + '/rd' : 'Dmg:' + def.dmg + ' Rng:' + def.range;
    info.appendChild(descEl);

    card.appendChild(info);
    card.addEventListener('click', function() { selectTowerForPlacement(key); });
    list.appendChild(card);
  }
}

function updateShopCards() {
  const cards = document.querySelectorAll('.tower-card');
  cards.forEach(function(card) {
    const key = card.dataset.tower;
    const def = TOWER_DEFS[key];
    if (state.cash < def.cost) {
      card.classList.add('disabled');
    } else {
      card.classList.remove('disabled');
    }
    if (state.placingTower === key) {
      card.classList.add('selected');
    } else {
      card.classList.remove('selected');
    }
  });
}

// ── Tower Placement ────────────────────────────────────────────
function selectTowerForPlacement(key) {
  initAudio();
  if (state.cash < TOWER_DEFS[key].cost) return;
  if (state.placingTower === key) {
    state.placingTower = null;
  } else {
    state.placingTower = key;
    state.selectedTower = null;
    hideTowerDetail();
  }
  updateShopCards();
}

function canPlaceTower(x, y) {
  if (isOnPath(x, y, PATH_W * 0.6 + 14)) return false;
  if (x < 10 || x > gameW - 10 || y < HUD_H + 10 || y > gameH - 10) return false;
  for (const t of state.towers) {
    const dx = t.x - x, dy = t.y - y;
    if (dx*dx + dy*dy < 30*30) return false;
  }
  return true;
}

function placeTower(x, y) {
  const key = state.placingTower;
  const def = TOWER_DEFS[key];
  if (!canPlaceTower(x, y)) return;
  if (state.cash < def.cost) return;

  state.cash -= def.cost;
  const tower = {
    x: x, y: y, type: key,
    range: def.range, rate: def.rate, dmg: def.dmg,
    cooldown: 0, level: 0, targetAngle: 0, fireScale: 1, rangePulse: 0,
    isFarm: !!def.isFarm, income: def.income || 0, slow: !!def.slow,
  };
  state.towers.push(tower);
  state.placingTower = null;
  playSound('place');
  updateShopCards();
  updateHUD();
}

// ── Tower Detail Panel ─────────────────────────────────────────
function showTowerDetail(tower) {
  state.selectedTower = tower;
  const panel = document.getElementById('tower-detail');
  const def = TOWER_DEFS[tower.type];
  panel.style.display = 'flex';

  document.getElementById('detail-name').textContent = def.full + ' (Lv.' + tower.level + ')';

  const statsEl = document.getElementById('detail-stats');
  while (statsEl.firstChild) statsEl.removeChild(statsEl.firstChild);

  if (tower.isFarm) {
    statsEl.textContent = 'Income: $' + Math.round(tower.income) + '/round';
  } else {
    statsEl.textContent = 'DMG: ' + tower.dmg + ' | Range: ' + Math.round(tower.range) + ' | Rate: ' + tower.rate.toFixed(2) + 's';
  }

  const upgCost = getUpgradeCost(tower);
  const upgBtn = document.getElementById('upgrade-btn');
  if (tower.level >= 5) {
    upgBtn.textContent = 'MAX LEVEL';
    upgBtn.disabled = true;
  } else {
    upgBtn.textContent = 'Upgrade $' + upgCost;
    upgBtn.disabled = state.cash < upgCost;
  }

  const sellVal = getSellValue(tower);
  document.getElementById('sell-btn').textContent = 'Sell $' + sellVal;
}

function hideTowerDetail() {
  document.getElementById('tower-detail').style.display = 'none';
  state.selectedTower = null;
}

function getUpgradeCost(tower) {
  const base = Math.round(TOWER_DEFS[tower.type].cost * 0.6);
  return Math.round(base * Math.pow(1.6, tower.level));
}

function getSellValue(tower) {
  const baseCost = TOWER_DEFS[tower.type].cost;
  let total = baseCost;
  const upgradeBase = Math.round(baseCost * 0.6);
  for (let i = 0; i < tower.level; i++) {
    total += Math.round(upgradeBase * Math.pow(1.6, i));
  }
  return Math.round(total * 0.7);
}

function upgradeTower(tower) {
  if (tower.level >= 5) return;
  const cost = getUpgradeCost(tower);
  if (state.cash < cost) return;
  state.cash -= cost;
  tower.level++;
  if (tower.isFarm) {
    tower.income = Math.round(tower.income * 1.5);
  } else {
    tower.range = Math.round(tower.range * 1.12);
    tower.dmg += 1;
    tower.rate *= 0.85;
  }
  playSound('cash');
  showTowerDetail(tower);
  updateHUD();
}

function sellTower(tower) {
  const val = getSellValue(tower);
  state.cash += val;
  state.towers = state.towers.filter(function(t) { return t !== tower; });
  hideTowerDetail();
  playSound('cash');
  spawnFloatingText(tower.x, tower.y, '+$' + val, '#ffcc00');
  updateHUD();
}

// ── Wave Generation ────────────────────────────────────────────
function generateWave(round) {
  const wave = [];
  const baseCount = 8 + round * 2;

  if (round <= 5) {
    for (let i = 0; i < baseCount; i++) {
      wave.push({ type: round <= 2 ? 'red' : (Math.random() < 0.6 ? 'red' : 'blue'), delay: i * 0.45 });
    }
  } else if (round <= 15) {
    const types = ['red','blue','green','yellow'];
    for (let i = 0; i < baseCount; i++) {
      const tier = Math.min(Math.floor(Math.random() * (1 + round * 0.2)), types.length - 1);
      wave.push({ type: types[tier], delay: i * 0.35 });
    }
  } else if (round <= 25) {
    const types = ['blue','green','yellow','pink','black','white'];
    for (let i = 0; i < baseCount; i++) {
      const tier = Math.min(Math.floor(Math.random() * (round * 0.15)), types.length - 1);
      wave.push({ type: types[tier], delay: i * 0.3 });
    }
  } else if (round <= 40) {
    const types = ['green','yellow','pink','black','white','rainbow','ceramic'];
    for (let i = 0; i < Math.floor(baseCount * 0.8); i++) {
      const tier = Math.min(Math.floor(Math.random() * (round * 0.12)), types.length - 1);
      wave.push({ type: types[tier], delay: i * 0.28 });
    }
  } else {
    // MOAB rounds
    const types = ['pink','black','white','rainbow','ceramic'];
    for (let i = 0; i < Math.floor(baseCount * 0.6); i++) {
      const tier = Math.min(Math.floor(Math.random() * types.length), types.length - 1);
      wave.push({ type: types[tier], delay: i * 0.22 });
    }
    // MOABs
    const moabCount = Math.floor((round - 40) / 5) + 1;
    for (let i = 0; i < moabCount; i++) {
      wave.push({ type: 'moab', delay: baseCount * 0.22 + i * 3 });
    }
    // BFBs after round 65
    if (round >= 65) {
      const bfbCount = Math.floor((round - 65) / 10) + 1;
      for (let i = 0; i < bfbCount; i++) {
        wave.push({ type: 'bfb', delay: baseCount * 0.22 + moabCount * 3 + i * 5 });
      }
    }
  }

  // Boss waves every 10th round
  if (round > 0 && round % 10 === 0) {
    const bossType = round >= 65 ? 'bfb' : 'moab';
    const bossCount = Math.floor(round / 20) + 1;
    const lastDelay = wave.length > 0 ? wave[wave.length - 1].delay + 2 : 0;
    for (let i = 0; i < bossCount; i++) {
      wave.push({ type: bossType, delay: lastDelay + i * 3 });
    }
  }

  return wave;
}

function startWave() {
  state.round++;
  state.waveActive = true;
  state.roundBalloons = generateWave(state.round);
  state.spawnTimer = 0;
  state.spawnIndex = 0;

  // Round income from farms
  state.roundIncome = 0;
  for (const t of state.towers) {
    if (t.isFarm) {
      state.roundIncome += t.income;
    }
  }
  state.cash += state.roundIncome;
  if (state.roundIncome > 0) {
    playSound('cash');
  }

  // Round base income
  const baseIncome = 100 + state.round;
  state.cash += baseIncome;
  state.roundIncome += baseIncome;

  playSound('roundstart');
  showWaveBanner('Round ' + state.round);

  // Check for MOAB warning
  if (state.roundBalloons.some(function(b) { return b.type === 'moab' || b.type === 'bfb'; })) {
    setTimeout(function() { playSound('moab'); }, 500);
  }

  document.getElementById('send-wave-btn').classList.add('hidden');
  updateHUD();
}

// ── Game Update ────────────────────────────────────────────────
function update(dt) {
  // Slow-mo effect (MOAB pop)
  if (state.slowMoTimer > 0) {
    state.slowMoTimer -= dt;
    state.slowMoFactor = Math.min(1, state.slowMoFactor + dt * 2);
  } else {
    state.slowMoFactor = 1;
  }
  const speed = state.gameSpeed * state.slowMoFactor;
  const adt = dt * speed;
  state.gameTime += dt;
  if (state.flashFrame > 0) state.flashFrame--;

  // Screen shake decay
  if (state.shakeDuration > 0) {
    state.shakeDuration -= dt;
    state.shakeX = (Math.random() - 0.5) * 6 * (state.shakeDuration / 0.3);
    state.shakeY = (Math.random() - 0.5) * 6 * (state.shakeDuration / 0.3);
    if (state.shakeDuration <= 0) { state.shakeX = 0; state.shakeY = 0; }
  }

  // Wave banner timer
  if (state.waveBannerTimer > 0) {
    state.waveBannerTimer -= dt;
    if (state.waveBannerTimer <= 0) {
      document.getElementById('wave-banner').classList.remove('show');
    }
  }

  // Spawn balloons
  if (state.waveActive && state.spawnIndex < state.roundBalloons.length) {
    state.spawnTimer += adt;
    while (state.spawnIndex < state.roundBalloons.length) {
      const next = state.roundBalloons[state.spawnIndex];
      if (state.spawnTimer >= next.delay) {
        spawnBalloon(next.type, 0);
        state.spawnIndex++;
      } else {
        break;
      }
    }
  }

  // Update balloons
  for (let i = state.balloons.length - 1; i >= 0; i--) {
    const b = state.balloons[i];
    const def = BLOON_COLORS[b.type];
    let spd = def.speed * 60 * adt;
    if (b.slowTimer > 0) {
      spd *= 0.5;
      b.slowTimer -= adt;
    }
    b.dist += spd;
    if (b.hitFlash > 0) b.hitFlash -= dt * 3;

    if (b.dist >= totalPathLength) {
      // Leaked
      const rbe = def.rbe || 1;
      state.lives -= rbe;
      state.balloons.splice(i, 1);
      if (state.lives <= 0) {
        state.lives = 0;
        gameOver();
      }
      updateHUD();
    }
  }

  // Tower targeting and firing
  for (const tower of state.towers) {
    if (tower.isFarm) continue;
    tower.cooldown -= adt;

    // Scale animation
    if (tower.fireScale > 1) {
      tower.fireScale = Math.max(1, tower.fireScale - dt * 3);
    }

    if (tower.cooldown <= 0) {
      // Find target (first in range, furthest along path)
      let target = null;
      let bestDist = -1;
      for (const b of state.balloons) {
        const pos = getPointAtDistance(b.dist);
        const dx = pos.x - tower.x, dy = pos.y - tower.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d <= tower.range && b.dist > bestDist) {
          target = b;
          bestDist = b.dist;
        }
      }
      if (target) {
        const tpos = getPointAtDistance(target.dist);
        tower.targetAngle = Math.atan2(tpos.y - tower.y, tpos.x - tower.x);
        fireProjectile(tower, target, tpos);
        tower.cooldown = tower.rate;
        tower.fireScale = 1.2;
        tower.rangePulse = 1;
        playSound('shoot');
      }
    }
  }

  // Update projectiles
  for (let i = state.projectiles.length - 1; i >= 0; i--) {
    const p = state.projectiles[i];
    const spd = 500 * adt;
    const dx = p.tx - p.x, dy = p.ty - p.y;
    const d = Math.sqrt(dx*dx + dy*dy);

    // Store trail
    p.trail.push({x: p.x, y: p.y});
    if (p.trail.length > 5) p.trail.shift();

    if (d < spd + 5) {
      // Hit
      hitBalloon(p);
      state.projectiles.splice(i, 1);
    } else {
      p.x += (dx / d) * spd;
      p.y += (dy / d) * spd;
      // Update target position if target still exists
      if (p.target && state.balloons.includes(p.target)) {
        const newPos = getPointAtDistance(p.target.dist);
        p.tx = newPos.x;
        p.ty = newPos.y;
      }
      p.life -= adt;
      if (p.life <= 0) state.projectiles.splice(i, 1);
    }
  }

  // Update particles
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const p = state.particles[i];
    p.x += p.vx * adt;
    p.y += p.vy * adt;
    p.vy += 200 * adt; // gravity
    p.life -= adt;
    if (p.life <= 0) state.particles.splice(i, 1);
  }

  // Update floating texts
  for (let i = state.floatingTexts.length - 1; i >= 0; i--) {
    const ft = state.floatingTexts[i];
    ft.y -= 40 * adt;
    ft.life -= adt;
    if (ft.life <= 0) state.floatingTexts.splice(i, 1);
  }

  // Combo timer
  if (state.comboTimer > 0) {
    state.comboTimer -= dt;
    if (state.comboTimer <= 0) {
      state.comboCount = 0;
      document.getElementById('combo-display').classList.remove('show');
    }
  }
  if (state.comboCount >= 5) {
    const comboEl = document.getElementById('combo-display');
    comboEl.textContent = 'COMBO x' + state.comboCount + '!';
    comboEl.className = '';
    if (state.comboCount >= 20) comboEl.className = 'show streak-mega';
    else if (state.comboCount >= 10) comboEl.className = 'show streak-super';
    else comboEl.className = 'show streak-fire';
  }

  // AI tick
  if (state.aiEnabled) aiTick(dt);

  // Tower pulse decay
  for (const tower of state.towers) {
    if (tower.rangePulse > 0) tower.rangePulse -= dt * 3;
  }

  // Check wave complete
  if (state.waveActive && state.spawnIndex >= state.roundBalloons.length && state.balloons.length === 0) {
    state.waveActive = false;
    state.autoSendTimer = 4;
    playWaveComplete();
    document.getElementById('send-wave-btn').classList.remove('hidden');
    saveGame();
    updateHUD();
  }

  // Auto-send
  if (state.autoSend && !state.waveActive && state.lives > 0) {
    state.autoSendTimer -= dt;
    if (state.autoSendTimer <= 0) {
      startWave();
    }
  }
}

function spawnBalloon(type, dist) {
  state.balloons.push({
    type: type,
    dist: dist || (Math.random() * 5),
    hp: BLOON_COLORS[type].hp,
    slowTimer: 0,
    hitFlash: 0,
    id: Math.random(),
  });
}

function fireProjectile(tower, target, tpos) {
  state.projectiles.push({
    x: tower.x, y: tower.y,
    tx: tpos.x, ty: tpos.y,
    dmg: tower.dmg, slow: tower.slow,
    target: target, life: 2,
    color: TOWER_DEFS[tower.type].fur,
    trail: [],
  });
}

function hitBalloon(proj) {
  const target = proj.target;
  if (!target || !state.balloons.includes(target)) {
    // Retarget: find nearest balloon to impact point
    let nearest = null, nearDist = Infinity;
    for (const b of state.balloons) {
      const bpos = getPointAtDistance(b.dist);
      const dx = bpos.x - proj.tx, dy = bpos.y - proj.ty;
      const d = dx*dx + dy*dy;
      if (d < nearDist && d < 40*40) { nearDist = d; nearest = b; }
    }
    if (!nearest) return;
    nearest.hp -= proj.dmg;
    nearest.hitFlash = 0.4;
    if (proj.slow) nearest.slowTimer = 2;
    if (nearest.hp <= 0) popBalloon(nearest);
    return;
  }

  target.hp -= proj.dmg;
  target.hitFlash = 0.4;
  if (proj.slow) target.slowTimer = 2;

  if (target.hp <= 0) {
    popBalloon(target);
  }
}

function popBalloon(bloon) {
  const idx = state.balloons.indexOf(bloon);
  if (idx === -1) return;
  state.balloons.splice(idx, 1);

  const def = BLOON_COLORS[bloon.type];
  const pos = getPointAtDistance(bloon.dist);

  state.totalPops++;
  const cashEarned = def.cash || 1;
  state.cash += cashEarned;
  playPopSound(bloon.type);
  spawnFloatingText(pos.x, pos.y, '+$' + cashEarned, '#ffcc00');

  // Combo tracking
  state.comboCount++;
  state.comboTimer = 1.5;
  if (state.comboCount > state.bestCombo) state.bestCombo = state.comboCount;

  // Enhanced pop particles — shred fragments
  const pColor = def.color === 'rainbow' ? '#ff6600' : def.color;
  const particleCount = def.isBlimp ? 24 : 12;
  spawnParticles(pos.x, pos.y, pColor, particleCount);

  // Air burst ring
  for (let ri = 0; ri < 12; ri++) {
    const angle = (ri / 12) * Math.PI * 2;
    const speed = 80 + Math.random() * 40;
    state.particles.push({
      x: pos.x, y: pos.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      color: 'rgba(255,255,255,0.6)', life: 0.2, maxLife: 0.2,
      size: 1.5, isRing: true,
    });
  }

  // Confetti for higher-tier pops
  if (def.rbe >= 5) {
    const confettiColors = ['#ff3366','#33ff66','#3366ff','#ffcc00','#ff66cc','#66ffcc'];
    for (let ci = 0; ci < 6; ci++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 40 + Math.random() * 80;
      state.particles.push({
        x: pos.x, y: pos.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 60,
        color: confettiColors[ci % confettiColors.length],
        life: 0.6 + Math.random() * 0.4, maxLife: 1.0,
        size: 1.5 + Math.random() * 2, isConfetti: true,
      });
    }
  }

  // Screen shake for blimps + slow-mo
  if (def.isBlimp) {
    state.shakeDuration = 0.4;
    state.slowMoTimer = 0.5;
    state.slowMoFactor = 0.3;
    // Flash frame
    state.flashFrame = 2;
  }

  // Spawn children
  if (def.children) {
    for (const childType of def.children) {
      spawnBalloon(childType, bloon.dist + (Math.random() * 10 - 5));
    }
  }

  updateHUD();
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 50 + Math.random() * 120;
    state.particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 40,
      color: color, life: 0.4 + Math.random() * 0.3,
      maxLife: 0.6, size: 2 + Math.random() * 3,
    });
  }
}

function spawnFloatingText(x, y, text, color) {
  state.floatingTexts.push({
    x: x, y: y, text: text, color: color,
    life: 1.0, maxLife: 1.0,
  });
}

function showWaveBanner(text) {
  const banner = document.getElementById('wave-banner');
  banner.textContent = text;
  banner.classList.add('show');
  state.waveBannerTimer = 2;
}

function gameOver() {
  state.waveActive = false;
  showWaveBanner('GAME OVER — Round ' + state.round);
  localStorage.removeItem(SAVE_KEY);
  setTimeout(function() {
    state.cash = 650;
    state.lives = 100;
    state.round = 0;
    state.totalPops = 0;
    state.towers = [];
    state.balloons = [];
    state.projectiles = [];
    state.particles = [];
    state.floatingTexts = [];
    state.warStartTime = Date.now();
    state.waveActive = false;
    document.getElementById('send-wave-btn').classList.remove('hidden');
    hideTowerDetail();
    updateHUD();
  }, 3000);
}

// ── Rendering ──────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(offsetX + state.shakeX, offsetY + state.shakeY);
  ctx.scale(scaleFactor, scaleFactor);

  // Background
  ctx.drawImage(bgCanvas, 0, 0);

  // Placement preview
  if (state.placingTower) {
    const mx = (mouseX - offsetX) / scaleFactor;
    const my = (mouseY - offsetY) / scaleFactor;
    const def = TOWER_DEFS[state.placingTower];
    const valid = canPlaceTower(mx, my);

    // Range circle
    ctx.fillStyle = valid ? 'rgba(50,200,100,0.1)' : 'rgba(200,50,50,0.1)';
    ctx.strokeStyle = valid ? 'rgba(50,200,100,0.3)' : 'rgba(200,50,50,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(mx, my, def.range, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Ghost monkey
    ctx.globalAlpha = 0.6;
    ctx.save();
    ctx.translate(mx, my);
    drawMonkey(ctx, def, 30, 0, 0);
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  // Selected tower range
  if (state.selectedTower) {
    const t = state.selectedTower;
    ctx.strokeStyle = 'rgba(100,180,255,0.3)';
    ctx.fillStyle = 'rgba(100,180,255,0.05)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.range, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  }

  // Draw towers
  for (const tower of state.towers) {
    ctx.save();
    ctx.translate(tower.x, tower.y);
    // Squash/stretch recoil
    const recoil = tower.fireScale - 1;
    ctx.scale(1 - recoil * 0.5, 1 + recoil);
    const def = TOWER_DEFS[tower.type];
    drawMonkey(ctx, def, 30, tower.targetAngle, tower.level);
    ctx.restore();

    // Range pulse on fire
    if (tower.rangePulse > 0) {
      ctx.save();
      ctx.globalAlpha = tower.rangePulse * 0.12;
      ctx.strokeStyle = TOWER_DEFS[tower.type].fur;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(tower.x, tower.y, tower.range * (1 - tower.rangePulse * 0.08), 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // Selection highlight
    if (state.selectedTower === tower) {
      ctx.strokeStyle = '#66bbff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(tower.x, tower.y, 20, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // Draw balloons
  for (const bloon of state.balloons) {
    drawBalloon(ctx, bloon);
  }

  // Draw projectiles
  for (const p of state.projectiles) {
    // Trail
    for (let ti = 0; ti < p.trail.length; ti++) {
      const alpha = (ti + 1) / (p.trail.length + 1) * 0.4;
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(p.trail[ti].x, p.trail[ti].y, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Projectile
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw particles with additive blending
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const p of state.particles) {
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha * 0.7;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;
  ctx.restore();

  // Floating text
  for (const ft of state.floatingTexts) {
    const alpha = ft.life / ft.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = ft.color;
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
  }
  ctx.globalAlpha = 1;

  // Flash frame (MOAB pop white flash)
  if (state.flashFrame > 0) {
    ctx.fillStyle = 'rgba(255,255,255,' + (state.flashFrame * 0.15) + ')';
    ctx.fillRect(0, 0, gameW, gameH);
  }

  ctx.restore();
}

// ── HUD Updates ────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('hud-round').textContent = state.round;
  document.getElementById('hud-cash').textContent = '$' + state.cash;
  document.getElementById('hud-lives').textContent = state.lives;
  document.getElementById('hud-pops').textContent = state.totalPops;
  document.getElementById('hud-income').textContent = '$' + state.roundIncome;

  // Lives color
  const livesEl = document.getElementById('hud-lives');
  livesEl.style.color = state.lives > 50 ? '#44ff88' : state.lives > 20 ? '#ffaa33' : '#ff3344';

  updateShopCards();

  if (state.selectedTower && state.towers.includes(state.selectedTower)) {
    showTowerDetail(state.selectedTower);
  }
}

function updateClock() {
  const now = new Date();
  const hours = now.getHours().toString().padStart(2, '0');
  const mins = now.getMinutes().toString().padStart(2, '0');
  const secs = now.getSeconds().toString().padStart(2, '0');

  const warDuration = Date.now() - state.warStartTime;
  const warMins = Math.floor(warDuration / 60000);
  const warSecs = Math.floor((warDuration % 60000) / 1000);

  const clockEl = document.getElementById('clock-display');
  clockEl.textContent = hours + ':' + mins + ':' + secs + ' | War: ' + warMins + 'm ' + warSecs + 's';
}

// ── Save / Load ────────────────────────────────────────────────
function saveGame() {
  try {
    const data = {
      cash: state.cash, lives: state.lives, round: state.round,
      totalPops: state.totalPops, warStartTime: state.warStartTime,
      autoSend: state.autoSend, gameSpeed: state.gameSpeed,
      towers: state.towers.map(function(t) {
        return { x: t.x, y: t.y, type: t.type, level: t.level,
                 range: t.range, rate: t.rate, dmg: t.dmg,
                 income: t.income, slow: t.slow, isFarm: t.isFarm };
      }),
      savedAt: Date.now(),
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch(e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data || !data.towers) return false;

    state.cash = data.cash || 650;
    state.lives = data.lives || 100;
    state.round = data.round || 0;
    state.totalPops = data.totalPops || 0;
    state.warStartTime = data.warStartTime || Date.now();
    state.autoSend = data.autoSend || false;
    state.gameSpeed = data.gameSpeed || 1;

    state.towers = data.towers.map(function(t) {
      return {
        x: t.x, y: t.y, type: t.type, level: t.level || 0,
        range: t.range, rate: t.rate, dmg: t.dmg,
        cooldown: 0, targetAngle: 0, fireScale: 1, rangePulse: 0,
        income: t.income || 0, slow: !!t.slow, isFarm: !!t.isFarm,
      };
    });

    // Offline income calculation
    if (data.savedAt) {
      const awayMinutes = (Date.now() - data.savedAt) / 60000;
      const offlineRounds = Math.floor(awayMinutes / 2);
      if (offlineRounds > 0) {
        let farmIncome = 0;
        for (const t of state.towers) {
          if (t.isFarm) farmIncome += t.income;
        }
        const offlineEarnings = offlineRounds * farmIncome;
        if (offlineEarnings > 0) {
          state.cash += offlineEarnings;
          showWelcomeBanner(offlineRounds, offlineEarnings);
        }
      }
    }

    // Update auto button
    if (state.autoSend) {
      document.getElementById('auto-btn').classList.add('active');
    }
    // Update speed buttons
    updateSpeedButtons();

    return true;
  } catch(e) {
    return false;
  }
}

function showWelcomeBanner(rounds, earnings) {
  const wb = document.getElementById('welcome-banner');
  wb.style.display = 'block';
  document.getElementById('welcome-title').textContent = 'Welcome Back, Agent';
  document.getElementById('welcome-text').textContent = 'While you were away (' + rounds + ' rounds), your farms earned $' + earnings + '.';
}

// ── Input Handling ─────────────────────────────────────────────
function handleCanvasClick(e) {
  initAudio();
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const gx = (cx - offsetX) / scaleFactor;
  const gy = (cy - offsetY) / scaleFactor;

  if (state.placingTower) {
    placeTower(gx, gy);
    return;
  }

  // Check if clicked on a tower
  let clickedTower = null;
  for (const t of state.towers) {
    const dx = gx - t.x, dy = gy - t.y;
    if (dx*dx + dy*dy < 22*22) {
      clickedTower = t;
      break;
    }
  }

  if (clickedTower) {
    showTowerDetail(clickedTower);
  } else {
    hideTowerDetail();
  }
}

function handleCanvasMove(e) {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
}

function handleKeyDown(e) {
  initAudio();
  switch(e.key) {
    case ' ':
      e.preventDefault();
      if (!state.waveActive && state.lives > 0) startWave();
      break;
    case '1': setSpeed(1); break;
    case '2': setSpeed(2); break;
    case '3': setSpeed(3); break;
    case 'Escape':
      state.placingTower = null;
      hideTowerDetail();
      updateShopCards();
      break;
  }
}

function setSpeed(spd) {
  state.gameSpeed = spd;
  updateSpeedButtons();
}

function updateSpeedButtons() {
  document.querySelectorAll('.speed-btn').forEach(function(btn) {
    const s = parseInt(btn.dataset.speed);
    if (s === state.gameSpeed) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });
}

// ── Resize ─────────────────────────────────────────────────────
function resizeCanvas() {
  const availW = window.innerWidth - SHOP_W;
  const availH = window.innerHeight;
  const scaleX = availW / gameW;
  const scaleY = availH / gameH;
  scaleFactor = Math.min(scaleX, scaleY);
  canvas.width = availW;
  canvas.height = availH;
  offsetX = (availW - gameW * scaleFactor) / 2;
  offsetY = (availH - gameH * scaleFactor) / 2;
}

// ── AI Auto-Play Controller ────────────────────────────────────
let aiTickAccum = 0;
const AI_TICK_INTERVAL = 1.2;

function aiTick(dt) {
  aiTickAccum += dt;
  if (aiTickAccum < AI_TICK_INTERVAL) return;
  aiTickAccum = 0;

  const aiEl = document.getElementById('ai-indicator');

  // 1. Start wave if not active and we have towers
  if (!state.waveActive && state.lives > 0 && state.towers.length > 0) {
    startWave();
    state.aiLastDecision = 'Starting round ' + state.round;
    aiEl.textContent = 'AI: ' + state.aiLastDecision;
    return;
  }

  // 2. Try upgrades first (better ROI than new towers)
  if (aiTryUpgrade()) { aiEl.textContent = 'AI: ' + state.aiLastDecision; return; }

  // 3. Try placing new towers
  if (aiTryPlace()) { aiEl.textContent = 'AI: ' + state.aiLastDecision; return; }

  state.aiLastDecision = 'Watching...';
  aiEl.textContent = 'AI: Watching (R' + state.round + ')';
}

function aiTryUpgrade() {
  let best = null, bestScore = 0;
  for (const t of state.towers) {
    if (t.level >= 5 || t.isFarm) continue;
    const cost = getUpgradeCost(t);
    if (state.cash < cost) continue;
    // Keep reserve in early game
    if (state.round < 10 && state.cash < cost * 1.4) continue;
    const score = t.dmg * (6 - t.level) * (t.range / 100);
    if (score > bestScore) { bestScore = score; best = t; }
  }
  if (best) {
    upgradeTower(best);
    state.aiLastDecision = 'Upgraded ' + TOWER_DEFS[best.type].name + ' → Lv.' + best.level;
    return true;
  }
  // Try upgrading farms
  for (const t of state.towers) {
    if (!t.isFarm || t.level >= 5) continue;
    const cost = getUpgradeCost(t);
    if (state.cash >= cost * 1.5) {
      upgradeTower(t);
      state.aiLastDecision = 'Upgraded farm → Lv.' + t.level;
      return true;
    }
  }
  return false;
}

function aiSelectTower() {
  const round = state.round;
  const count = state.towers.filter(function(t) { return !t.isFarm; }).length;
  const farmCount = state.towers.filter(function(t) { return t.isFarm; }).length;

  // Get income farm early
  if (farmCount === 0 && count >= 2 && state.cash >= TOWER_DEFS.telegram.cost) return 'telegram';

  // Early: cheap damage
  if (round <= 10) {
    const early = ['daily','daily','ali','ultra','jung'];
    return early[Math.min(count, early.length - 1)];
  }
  // Mid: balanced
  if (round <= 25) {
    if (farmCount < 2 && state.cash >= TOWER_DEFS.telegram.cost * 1.3) return 'telegram';
    const mid = ['ali','garage','jung','cos','meta','im'];
    return mid[Math.floor(Math.random() * mid.length)];
  }
  // Late: power
  const late = ['cos','im','garage','ali','cos'];
  return late[Math.floor(Math.random() * late.length)];
}

function aiScorePosition(x, y, range) {
  let score = 0;
  for (let i = 0; i < pathPoints.length; i += 4) {
    const dx = pathPoints[i].x - x, dy = pathPoints[i].y - y;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d < range) score += 1 + (range - d) / range;
  }
  // Penalty for clustering
  for (const t of state.towers) {
    const dx = t.x - x, dy = t.y - y;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d < 70) score *= 0.4;
    else if (d < 120) score *= 0.7;
  }
  return score;
}

function aiTryPlace() {
  const towerKey = aiSelectTower();
  if (!towerKey) return false;
  const def = TOWER_DEFS[towerKey];
  if (state.cash < def.cost) return false;
  if (state.round < 5 && state.cash < def.cost * 1.2) return false;

  // Find best position via grid sampling
  let bestPos = null, bestScore = -1;
  const step = 45;
  for (let x = 60; x < gameW - 60; x += step) {
    for (let y = HUD_H + 60; y < gameH - 60; y += step) {
      if (!canPlaceTower(x, y)) continue;
      const score = aiScorePosition(x, y, def.range || 100);
      if (score > bestScore) { bestScore = score; bestPos = {x, y}; }
    }
  }

  if (!bestPos || bestScore < 2) return false;

  state.placingTower = towerKey;
  placeTower(bestPos.x, bestPos.y);
  state.aiLastDecision = 'Placed ' + def.name;
  return true;
}

// ── Main Loop ──────────────────────────────────────────────────
let lastTime = 0;

function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  let dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  if (dt > 0.05) dt = 0.05; // cap

  update(dt);
  render();
  updateClock();

  requestAnimationFrame(gameLoop);
}

// ── Init ───────────────────────────────────────────────────────
function init() {
  canvas = document.getElementById('game-canvas');
  ctx = canvas.getContext('2d');

  // Generate smooth path
  pathPoints = catmullRom(RAW_WAYPOINTS, 16);
  computePathDistances();

  // Render background
  renderBackground();

  // Build UI
  buildShopPanel();
  resizeCanvas();

  // Load saved game
  const loaded = loadGame();
  updateHUD();

  // Event listeners
  canvas.addEventListener('click', handleCanvasClick);
  canvas.addEventListener('mousemove', handleCanvasMove);
  document.addEventListener('keydown', handleKeyDown);
  window.addEventListener('resize', resizeCanvas);

  document.getElementById('send-wave-btn').addEventListener('click', function() {
    initAudio();
    if (!state.waveActive && state.lives > 0) startWave();
  });

  // Speed buttons
  document.querySelectorAll('.speed-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      initAudio();
      setSpeed(parseInt(btn.dataset.speed));
    });
  });

  // Auto button — also enables AI controller
  document.getElementById('auto-btn').addEventListener('click', function() {
    initAudio();
    state.autoSend = !state.autoSend;
    state.aiEnabled = state.autoSend;
    const aiEl = document.getElementById('ai-indicator');
    if (state.autoSend) {
      this.classList.add('active');
      aiEl.classList.remove('inactive');
      aiEl.textContent = 'AI: Active — analyzing...';
    } else {
      this.classList.remove('active');
      aiEl.classList.add('inactive');
      aiEl.textContent = 'AI: OFF';
    }
  });

  // Upgrade button
  document.getElementById('upgrade-btn').addEventListener('click', function() {
    if (state.selectedTower) upgradeTower(state.selectedTower);
  });

  // Sell button
  document.getElementById('sell-btn').addEventListener('click', function() {
    if (state.selectedTower) sellTower(state.selectedTower);
  });

  // Welcome banner close
  document.getElementById('welcome-close').addEventListener('click', function() {
    document.getElementById('welcome-banner').style.display = 'none';
  });

  // Expose game state for Playwright testing
  window.__AGENT_BTD__ = {
    getState: function() { return state; },
    startWave: startWave,
    enableAI: function() {
      state.autoSend = true;
      state.aiEnabled = true;
      document.getElementById('auto-btn').classList.add('active');
      document.getElementById('ai-indicator').classList.remove('inactive');
      document.getElementById('ai-indicator').textContent = 'AI: Active';
    },
    placeTowerAt: function(key, x, y) {
      state.placingTower = key;
      placeTower(x, y);
    },
  };

  // Start game loop
  requestAnimationFrame(gameLoop);
}

// Start when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
</script>
