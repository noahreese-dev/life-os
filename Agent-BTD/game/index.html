<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent BTD — Life-OS War Room</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: #fff; display: flex; }
  #game-canvas { display: block; cursor: crosshair; }

  #hud {
    position: fixed; top: 0; left: 0; right: 240px;
    height: 52px; background: rgba(15,15,35,0.7);
    border-bottom: 2px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; padding: 0 18px; gap: 22px; z-index: 10;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .hud-item { display: flex; flex-direction: column; align-items: center; }
  .hud-label { font-size: 9px; color: #7788aa; text-transform: uppercase; letter-spacing: 1.2px; }
  .hud-value { font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .hud-value.cash { color: #ffcc00; }
  .hud-value.lives { color: #44ff88; }
  .hud-value.round { color: #66bbff; }
  .hud-value.pops { color: #cc88ff; }
  .hud-value.income { color: #ffaa33; }

  #speed-controls { display: flex; gap: 4px; margin-left: auto; }
  .speed-btn {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: #aabbcc;
    padding: 5px 12px; cursor: pointer; font-size: 12px; border-radius: 6px;
    transition: all 0.15s;
  }
  .speed-btn:hover { background: rgba(255,255,255,0.12); }
  .speed-btn.active { background: #3388ff; color: #fff; border-color: #3388ff; font-weight: 700; }

  #auto-btn {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: #aabbcc;
    padding: 5px 14px; cursor: pointer; font-size: 12px; border-radius: 6px;
    transition: all 0.15s;
  }
  #auto-btn.active { background: #22aa55; color: #fff; border-color: #22aa55; font-weight: 700; }

  #shop-panel {
    position: fixed; top: 0; right: 0; width: 240px; height: 100vh;
    background: rgba(15,15,35,0.88); border-left: 2px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    overflow-y: auto; z-index: 10; display: flex; flex-direction: column;
  }
  #shop-panel::-webkit-scrollbar { width: 4px; }
  #shop-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
  .shop-title {
    font-size: 13px; text-transform: uppercase; letter-spacing: 2px; color: #7788aa;
    padding: 14px 14px 8px; border-bottom: 1px solid rgba(255,255,255,0.06);
    text-align: center; font-weight: 600;
  }
  .tower-card {
    display: flex; align-items: center; gap: 10px; padding: 8px 12px;
    cursor: pointer; transition: background 0.15s; border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .tower-card:hover { background: rgba(255,255,255,0.06); }
  .tower-card.disabled { opacity: 0.35; cursor: not-allowed; }
  .tower-card.selected { background: rgba(51,136,255,0.2); border-left: 3px solid #3388ff; }
  .tower-card canvas { border-radius: 6px; background: rgba(0,0,0,0.2); flex-shrink: 0; }
  .tower-info { display: flex; flex-direction: column; min-width: 0; }
  .tower-name { font-size: 12px; font-weight: 600; color: #ddeeff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tower-cost { font-size: 11px; color: #ffcc00; font-weight: 600; }
  .tower-desc { font-size: 10px; color: #778899; }

  #tower-detail {
    border-top: 1px solid rgba(255,255,255,0.08); padding: 12px;
    display: none; flex-direction: column; gap: 8px; margin-top: auto;
    background: rgba(0,0,0,0.3);
  }
  .detail-title { font-size: 14px; font-weight: 700; color: #ddeeff; }
  .detail-stats { font-size: 11px; color: #8899aa; line-height: 1.6; }
  .detail-btn {
    padding: 7px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 12px; font-weight: 600; transition: all 0.15s;
  }
  .upgrade-btn { background: #2266cc; color: #fff; }
  .upgrade-btn:hover { background: #3377dd; }
  .upgrade-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
  .sell-btn { background: #772222; color: #faa; }
  .sell-btn:hover { background: #993333; }

  #wave-banner {
    position: fixed; top: 50%; left: calc((100vw - 240px) / 2); transform: translate(-50%, -50%);
    font-size: 48px; font-weight: 800; color: #fff; text-shadow: 0 0 30px rgba(51,136,255,0.6);
    pointer-events: none; opacity: 0; z-index: 20; transition: opacity 0.3s;
    letter-spacing: 2px;
  }
  #wave-banner.show { opacity: 1; }

  #send-wave-btn {
    position: fixed; bottom: 20px; left: calc((100vw - 240px) / 2); transform: translateX(-50%);
    padding: 14px 40px; background: linear-gradient(135deg, #22aa55, #2266cc);
    border: 2px solid rgba(255,255,255,0.2); border-radius: 12px;
    color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
    z-index: 15; letter-spacing: 1px; transition: all 0.2s;
    text-transform: uppercase;
  }
  #send-wave-btn:hover { transform: translateX(-50%) scale(1.05); box-shadow: 0 0 20px rgba(34,170,85,0.4); }
  #send-wave-btn.hidden { display: none; }

  #clock-display {
    position: fixed; bottom: 8px; left: 10px; font-size: 11px; color: #556677;
    z-index: 15; font-variant-numeric: tabular-nums;
  }

  #welcome-banner {
    position: fixed; top: 50%; left: calc((100vw - 240px) / 2); transform: translate(-50%, -50%);
    background: rgba(15,15,35,0.92); border: 2px solid rgba(51,136,255,0.3);
    border-radius: 16px; padding: 30px 40px; text-align: center; z-index: 30;
    backdrop-filter: blur(16px); display: none;
  }
  .welcome-title { font-size: 22px; font-weight: 700; color: #66bbff; margin-bottom: 8px; }
  .welcome-text { font-size: 14px; color: #aabbcc; margin-bottom: 16px; }
  .welcome-close {
    padding: 8px 24px; background: #2266cc; border: none; color: #fff;
    border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600;
  }

  #combo-display {
    position: fixed; top: 62px; left: calc((100vw - 240px) / 2); transform: translateX(-50%);
    font-size: 32px; font-weight: 900; pointer-events: none; z-index: 20;
    opacity: 0; transition: opacity 0.15s; letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(255,102,0,0.8), 0 2px 4px rgba(0,0,0,0.5);
  }
  #combo-display.show { opacity: 1; }

  #ai-indicator {
    position: fixed; bottom: 55px; left: 10px; font-size: 11px; color: #22aa55;
    z-index: 15; max-width: 320px; opacity: 0.8; font-family: monospace;
  }
  #ai-indicator.inactive { color: #556677; }

  .streak-fire { color: #ff3300; animation: streakPulse 0.3s ease-out; }
  .streak-super { color: #ff00ff; animation: streakPulse 0.3s ease-out; }
  .streak-mega { color: #ffcc00; animation: streakPulse 0.3s ease-out; }

  @keyframes streakPulse {
    0% { transform: translateX(-50%) scale(1.5); }
    100% { transform: translateX(-50%) scale(1); }
  }

  /* ── Music & Volume ─────────────────────────── */
  #music-btn {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: #aabbcc;
    padding: 5px 10px; cursor: pointer; font-size: 12px; border-radius: 6px;
    transition: all 0.15s;
  }
  #music-btn.active { background: #6633cc; color: #fff; border-color: #6633cc; }

  /* ── Round Progress Bar ─────────────────────── */
  #round-progress {
    position: fixed; top: 52px; left: 0; right: 240px; height: 3px;
    background: rgba(255,255,255,0.05); z-index: 10;
  }
  #round-progress-fill {
    height: 100%; width: 0%; background: linear-gradient(90deg, #3388ff, #22aa55);
    transition: width 0.3s;
  }

  /* ── Wave Preview ───────────────────────────── */
  #wave-preview {
    position: fixed; top: 58px; left: 10px; z-index: 15;
    font-size: 10px; color: #7788aa; display: flex; gap: 4px; align-items: center;
  }
  .preview-bloon {
    width: 10px; height: 12px; border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
    display: inline-block;
  }

  /* ── Game Over Overlay ──────────────────────── */
  #game-over-overlay {
    position: fixed; top: 0; left: 0; right: 240px; bottom: 0;
    background: rgba(0,0,0,0.85); z-index: 50; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
  }
  #game-over-overlay.show { display: flex; }
  .go-title { font-size: 48px; font-weight: 900; color: #ff3344; margin-bottom: 20px; text-shadow: 0 0 30px rgba(255,50,50,0.5); }
  .go-stats { font-size: 14px; color: #aabbcc; line-height: 2; text-align: center; margin-bottom: 24px; }
  .go-stat-value { color: #fff; font-weight: 700; font-size: 16px; }
  .go-retry {
    padding: 14px 40px; background: linear-gradient(135deg, #22aa55, #2266cc);
    border: 2px solid rgba(255,255,255,0.2); border-radius: 12px;
    color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
    text-transform: uppercase; transition: all 0.2s;
  }
  .go-retry:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(34,170,85,0.4); }

  /* ── Minimap ────────────────────────────────── */
  #minimap {
    position: fixed; bottom: 10px; left: 10px; z-index: 15;
    border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
    background: rgba(0,0,0,0.4); opacity: 0.8;
  }

  /* ── Targeting Popup ────────────────────────── */
  #targeting-popup {
    position: fixed; display: none; z-index: 25;
    background: rgba(15,15,35,0.95); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; padding: 6px; backdrop-filter: blur(8px);
  }
  .target-opt {
    padding: 6px 14px; cursor: pointer; font-size: 11px; color: #aabbcc;
    border-radius: 4px; transition: background 0.1s;
  }
  .target-opt:hover { background: rgba(255,255,255,0.1); }
  .target-opt.active { color: #66bbff; font-weight: 700; }

  /* ── Agent Superpowers ──────────────────────── */
  .detail-btn.ability-btn { background: #6633cc; color: #fff; }
  .detail-btn.ability-btn:hover { background: #7744dd; }
  .detail-btn.clone-btn { background: #cc6600; color: #fff; }
  .detail-btn.clone-btn:hover { background: #dd7711; }
  .detail-btn.teleport-btn { background: #2288aa; color: #fff; }
  .detail-btn.teleport-btn:hover { background: #33aacc; }
</style>
</head>
<body>
<canvas id="game-canvas"></canvas>

<div id="hud">
  <div class="hud-item"><span class="hud-label">Round</span><span id="hud-round" class="hud-value round">0</span></div>
  <div class="hud-item"><span class="hud-label">Cash</span><span id="hud-cash" class="hud-value cash">$650</span></div>
  <div class="hud-item"><span class="hud-label">Lives</span><span id="hud-lives" class="hud-value lives">100</span></div>
  <div class="hud-item"><span class="hud-label">Pops</span><span id="hud-pops" class="hud-value pops">0</span></div>
  <div class="hud-item"><span class="hud-label">Income</span><span id="hud-income" class="hud-value income">$0</span></div>
  <div id="speed-controls">
    <button class="speed-btn active" data-speed="1">1x</button>
    <button class="speed-btn" data-speed="2">2x</button>
    <button class="speed-btn" data-speed="3">3x</button>
  </div>
  <button id="auto-btn">AUTO</button>
  <button id="music-btn">♪</button>
</div>
<div id="round-progress"><div id="round-progress-fill"></div></div>
<div id="wave-preview"></div>

<div id="shop-panel">
  <div class="shop-title">Agent Towers</div>
  <div id="tower-list"></div>
  <div id="tower-detail">
    <div class="detail-title" id="detail-name"></div>
    <div class="detail-stats" id="detail-stats"></div>
    <div id="detail-ability" style="font-size:10px;color:#bb88ff;"></div>
    <div id="detail-target" style="font-size:10px;color:#66bbff;cursor:pointer;"></div>
    <button class="detail-btn upgrade-btn" id="upgrade-btn">Upgrade</button>
    <button class="detail-btn clone-btn" id="clone-btn">Clone Agent</button>
    <button class="detail-btn teleport-btn" id="teleport-btn">Teleport</button>
    <button class="detail-btn sell-btn" id="sell-btn">Sell</button>
  </div>
</div>

<div id="wave-banner"></div>
<button id="send-wave-btn">SEND WAVE</button>
<div id="clock-display"></div>
<div id="combo-display"></div>
<div id="ai-indicator" class="inactive">AI: OFF</div>
<div id="welcome-banner">
  <div class="welcome-title" id="welcome-title"></div>
  <div class="welcome-text" id="welcome-text"></div>
  <button class="welcome-close" id="welcome-close">Continue</button>
</div>
<canvas id="minimap" width="200" height="120"></canvas>
<div id="game-over-overlay">
  <div class="go-title">GAME OVER</div>
  <div class="go-stats" id="go-stats"></div>
  <button class="go-retry" id="go-retry">RETRY</button>
</div>
<div id="targeting-popup">
  <div class="target-opt" data-mode="first">► First</div>
  <div class="target-opt" data-mode="last">◄ Last</div>
  <div class="target-opt" data-mode="strong">★ Strong</div>
  <div class="target-opt" data-mode="close">◎ Close</div>
</div>

<!-- PixiJS 8 — GPU-accelerated WebGL2 renderer -->
<script src="vendor/pixi.js"></script>

<!-- Modular game engine -->
<script src="js/state.js"></script>
<script src="js/audio.js"></script>
<script src="js/ui.js"></script>
<script src="js/towers.js"></script>
<script src="js/balloons.js"></script>
<script src="js/projectiles.js"></script>
<script src="js/ai.js"></script>
<script src="js/save.js"></script>
<script src="js/renderer.js"></script>
<script src="js/main.js"></script>

<script>
// Legacy compatibility — this block is intentionally empty.
// All game code has been migrated to modular js/ files.
// PixiJS 8 WebGL2 renderer replaces Canvas 2D.
</script>
</body>
</html>
